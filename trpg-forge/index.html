<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>TRPG Forge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>TRPG Forge</h1>

<h2>システム名</h2>
<input id="systemName">

<h2>ベースシステム</h2>

<select id="baseSystem" onchange="applyBaseSystem()">
<option value="custom">カスタム</option>
<option value="coc">クトゥルフ</option>
<option value="emoklore">エモクロア</option>
</select>

<h2>能力値</h2>

<div id="stats"></div>

<button onclick="addStat()">能力値追加</button>

<br><br>

<button onclick="saveSystem()">💾TRPG保存</button>

<h2>作成済みTRPG</h2>

<div id="systemList"></div>

<script src="script.js"></script>

</body>
</html>
